{% if can_send_mail() %}
<div
    id="ctfdio-snackbar-email-nudge"
    class="alert alert-info alert-dismissible col-md-4 col-10 position-fixed text-center m-0 ctfdio-email-nudge"
    style="bottom: 45px; left: 50%; transform: translateX(-50%); z-index: 1040; display: none;"
    role="alert"
>
    <small>
        <strong>{% trans %}Email Unconfirmed{% endtrans %}</strong><br>
        <span>{% trans %}To confirm your email address please{% endtrans %} <a href="{{ url_for('auth.confirm', flow='init') }}">{% trans %}click here{% endtrans %}</a>.</span>
    </small>
    <button type="button" class="close" aria-label="Close" onclick="localStorage.setItem('remind_email_verify', window.init.userId); this.parentElement.style.display = 'none';">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<script>
(function() {
    var el = document.getElementById("ctfdio-snackbar-email-nudge");
    if (!el) return;
    var init = window.init || {};
    var path = window.location.pathname;
    var teamPaths = ['/team', '/teams/join', '/teams/new'];
    var shouldShow = init.userId && !init.userVerified &&
        localStorage.getItem('remind_email_verify') != init.userId &&
        (teamPaths.indexOf(path) === -1 || init.teamId != null);
    if (shouldShow) {
        el.style.display = "";
    }
})();
</script>
{% endif %}
