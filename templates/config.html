<form>
  <div class="form-group">
    <label>{% trans %}Challenge Window Size{% endtrans %}</label>
    <select class="form-control custom-select" name="challenge_window_size">
        <option value="sm">{% trans %}Small{% endtrans %}</option>
        <option value="norm">{% trans %}Normal{% endtrans %}</option>
        <option value="lg">{% trans %}Large{% endtrans %}</option>
        <option value="xl">{% trans %}Extra Large{% endtrans %}</option>
    </select>
  </div>

  <div class="form-group">
    <label>
      {% trans %}Challenge Category Order Custom Function{% endtrans %}<br>
      <small class="form-text text-muted">
        {% trans %}Define a custom compareFn function for Array.sort() used to sort the challenge categories{% endtrans %}
      </small>
    </label>
    <textarea class="form-control text-monospace" name="challenge_category_order" rows="5"></textarea>
  </div>

  <div class="form-group">
    <label>
      {% trans %}Challenge Order Custom Function{% endtrans %}<br>
      <small class="form-text text-muted">
        {% trans %}Define a custom compareFn function for Array.sort() used to sort the challenges within categories{% endtrans %}
      </small>
    </label>
    <textarea class="form-control text-monospace" name="challenge_order" rows="5"></textarea>
  </div>

  <div>
    <div class="form-check">
      <input type="checkbox" class="form-check-input" id="use_builtin_code_highlighter" name="use_builtin_code_highlighter" checked>
      <label class="form-check-label" for="use_builtin_code_highlighter">
        {% trans %}Use Built-In Syntax Highlighter{% endtrans %}
      </label>
    </div>
    <small class="form-text text-muted">
      {% trans %}The built-in syntax highlighter is lightweight and fast but may not always correctly highlight all languages. You can disable the built-in highlighter in order to use your own.{% endtrans %}
    </small>
  </div>

  <button type="submit" class="btn btn-primary float-right mt-4">{% trans %}Update{% endtrans %}</button>
</form>
