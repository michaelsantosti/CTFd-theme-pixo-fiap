{% extends "base.html" %}

{% block stylesheets %}
	<link rel="stylesheet" href="{{ url_for('views.themes', path='css/challenge-board.css') }}">
{% endblock %}

{% block content %}
<div class="jumbotron">
	<div class="container">
		<h1>{% trans %}Challenges{% endtrans %}</h1>
	</div>
</div>

<div class="modal fade" id="challenge-window" tabindex="-1" role="dialog">
</div>

<div class="container">
	<div class="row">
		<div class="col-md-12">
			{% include "components/errors.html" %}
		</div>
	</div>

	<div id='challenges-board'>
		<div class="min-vh-50 d-flex align-items-center">
			<div class="text-center w-100">
				<i class="fas fa-circle-notch fa-spin fa-3x fa-fw spinner"></i>
			</div>
		</div>
	</div>
</div>
{% endblock %}

{% block scripts %}
<script>
window._i18n = {
	solves: "{% trans %}Solves{% endtrans %}",
	challengeHidden: "{% trans %}Challenge Hidden!{% endtrans %}",
	notUnlocked: "{% trans %}You haven't unlocked this challenge yet!{% endtrans %}",
	gotIt: "{% trans %}Got it!{% endtrans %}",
	hint: "{% trans %}Hint{% endtrans %}",
	unlockHint: "{% trans %}Unlock Hint?{% endtrans %}",
	unlockHintConfirm: "{% trans %}Are you sure you want to open this hint?{% endtrans %}",
	error: "{% trans %}Error{% endtrans %}",
	// Submission status messages
	correct: "{% trans %}Correct{% endtrans %}",
	incorrect: "{% trans %}Incorrect{% endtrans %}",
	alreadySolved: "{% trans %}but you already solved this{% endtrans %}",
	tooFast: "{% trans %}You're submitting flags too fast. Try again in{% endtrans %}",
	seconds: "{% trans %}seconds{% endtrans %}",
	paused: "{% trans %}is paused{% endtrans %}"
};

// Runtime i18n patch for compiled JS bundle
(function() {
	var t = window._i18n;
	var modalStrings = {
		"Challenge Hidden!": t.challengeHidden,
		"You haven't unlocked this challenge yet!": t.notUnlocked,
		"Got it!": t.gotIt,
		"Hint": t.hint,
		"Unlock Hint?": t.unlockHint,
		"Are you sure you want to open this hint?": t.unlockHintConfirm,
		"Error": t.error
	};

	// Translate submission status messages from API
	function translateMessage(msg) {
		if (!msg) return msg;
		if (msg === "Correct") return t.correct;
		if (msg === "Incorrect") return t.incorrect;
		// "Incorrect but you already solved this" or "Correct but you already solved this"
		if (msg.indexOf("but you already solved this") !== -1) {
			var prefix = msg.split(" but ")[0];
			var translatedPrefix = prefix === "Correct" ? t.correct : (prefix === "Incorrect" ? t.incorrect : prefix);
			return translatedPrefix + " " + t.alreadySolved;
		}
		// "You're submitting flags too fast. Try again in X seconds."
		if (msg.indexOf("submitting flags too fast") !== -1) {
			var match = msg.match(/(\d+)/);
			var secs = match ? match[1] : "60";
			return t.tooFast + " " + secs + " " + t.seconds + ".";
		}
		// "Not accepted. Try again in X seconds"
		if (msg.indexOf("Try again in") !== -1 && msg.indexOf("Not accepted") !== -1) {
			var match = msg.match(/(\d+)/);
			var secs = match ? match[1] : "60";
			return t.tooFast + " " + secs + " " + t.seconds + ".";
		}
		// "CTFd is paused"
		if (msg.indexOf("is paused") !== -1) {
			var name = msg.replace(" is paused", "");
			return name + " " + t.paused;
		}
		return msg;
	}

	// Patch "Solves" text and submission messages
	var cw = document.getElementById("challenge-window");
	if (cw) {
		var cwObserver = new MutationObserver(function(mutations) {
			mutations.forEach(function(m) {
				if (m.type === "childList" || m.type === "characterData") {
					var el = m.target.nodeType === 1 ? m.target : m.target.parentElement;
					if (!el) return;
					// Translate "Solves" tab text
					var solveEls = el.querySelectorAll ? el.querySelectorAll(".challenge-solves") : [];
					if (el.classList && el.classList.contains("challenge-solves")) {
						solveEls = [el];
					}
					solveEls.forEach(function(se) {
						var txt = se.textContent;
						if (txt && txt.indexOf("Solves") !== -1 && t.solves !== "Solves") {
							se.textContent = txt.replace("Solves", t.solves);
						}
					});
				}
			});
		});
		cwObserver.observe(cw, { childList: true, subtree: true, characterData: true });

		// Translate submission result messages
		var msgObserver = new MutationObserver(function() {
			var msgEl = document.getElementById("result-message");
			if (msgEl && msgEl.textContent) {
				var translated = translateMessage(msgEl.textContent);
				if (translated !== msgEl.textContent) {
					msgEl.textContent = translated;
				}
			}
		});
		msgObserver.observe(cw, { childList: true, subtree: true });
	}

	// Patch ezAlert/ezQuery modal strings
	var mainEl = document.querySelector("main");
	if (mainEl) {
		var modalObserver = new MutationObserver(function(mutations) {
			mutations.forEach(function(m) {
				m.addedNodes.forEach(function(node) {
					if (node.nodeType !== 1) return;
					var modal = node.classList && node.classList.contains("modal") ? node : null;
					if (!modal) return;
					var title = modal.querySelector(".modal-title");
					if (title && modalStrings[title.textContent]) {
						title.textContent = modalStrings[title.textContent];
					}
					modal.querySelectorAll(".modal-body p, .modal-footer button").forEach(function(el) {
						if (modalStrings[el.textContent]) {
							el.textContent = modalStrings[el.textContent];
						}
					});
				});
			});
		});
		modalObserver.observe(mainEl, { childList: true });
	}
})();
</script>
{% endblock %}

{% block entrypoint %}
	<script defer src="{{ url_for('views.themes', path='js/pages/challenges.js') }}"></script>
{% endblock %}
